foundational_papers:
  # --- HNSW ---
  - id: malkov2016hnsw
    title: "Efficient and robust approximate nearest neighbor search using Hierarchical Navigable Small World graphs"
    authors: ["Yu. A. Malkov", "D. A. Yashunin"]
    year: 2016
    arxiv: "1603.09320"
    venue: "IEEE TPAMI 2018"
    algorithm: HNSW
    canonical_for: HNSW
    verified: true

  # --- ANN Theory ---
  - id: andoni2018ann_survey
    title: "Approximate Nearest Neighbor Search in High Dimensions"
    authors: ["Alexandr Andoni", "Piotr Indyk", "Ilya Razenshteyn"]
    year: 2018
    arxiv: "1806.09823"
    venue: "ICM 2018"
    topic: "ANN theory survey"
    verified: true

  # --- ScaNN ---
  - id: guo2019scann
    title: "Accelerating Large-Scale Inference with Anisotropic Vector Quantization"
    authors: ["Ruiqi Guo", "Philip Sun", "Erik Lindgren", "Quan Geng", "David Simcha", "Felix Chern", "Sanjiv Kumar"]
    year: 2019
    arxiv: "1908.10396"
    venue: "ICML 2020"
    algorithm: ScaNN
    canonical_for: ScaNN
    verified: true

  - id: sun2024soar
    title: "SOAR: Improved Indexing for Approximate Nearest Neighbor Search"
    authors: ["Philip Sun", "David Simcha", "Dave Dopson", "Ruiqi Guo", "Sanjiv Kumar"]
    year: 2024
    arxiv: "2404.00774"
    venue: "NeurIPS 2023"
    algorithm: "ScaNN / SOAR"
    verified: true

  # --- DiskANN / Vamana ---
  - id: subramanya2019diskann
    title: "DiskANN: Fast Accurate Billion-point Nearest Neighbor Search on a Single Node"
    authors: ["Suhas Jayaram Subramanya", "Devvrit", "Rohan Kadekodi", "Ravishankar Krishnaswamy", "Harsha Vardhan Simhadri"]
    year: 2019
    venue: "NeurIPS 2019"
    url: "https://suhasjs.github.io/files/diskann_neurips19.pdf"
    neurips_url: "https://proceedings.neurips.cc/paper/2019/hash/09853c7fb1d3f8ee67a61b6bf4a7f8e6-Abstract.html"
    doi: "10.5555/3454287.3455520"
    algorithm: "DiskANN / Vamana"
    canonical_for: "DiskANN / Vamana"
    notes: "Not on arXiv. Published directly at NeurIPS 2019."
    verified: true

  # --- Product Quantization ---
  - id: jegou2011pq
    title: "Product Quantization for Nearest Neighbor Search"
    authors: ["Hervé Jégou", "Matthijs Douze", "Cordelia Schmid"]
    year: 2011
    venue: "IEEE TPAMI, Vol. 33, No. 1, pp. 117-128"
    doi: "10.1109/TPAMI.2010.57"
    pdf: "https://www.irisa.fr/texmex/people/jegou/papers/jegou_searching_with_quantization.pdf"
    algorithm: PQ
    canonical_for: PQ
    notes: "Not on arXiv. arXiv:1102.3828 is a DIFFERENT paper (Searching in one billion vectors) — do not confuse."
    verified: true

  # --- FAISS ---
  - id: johnson2017faiss
    title: "Billion-scale similarity search with GPUs"
    authors: ["Jeff Johnson", "Matthijs Douze", "Hervé Jégou"]
    year: 2017
    arxiv: "1702.08734"
    venue: "IEEE Transactions on Big Data, 2019"
    canonical_for: FAISS
    verified: true

  # --- NSG ---
  - id: fu2017nsg
    title: "Fast Approximate Nearest Neighbor Search With The Navigating Spreading-out Graph"
    authors: ["Cong Fu", "Chao Xiang", "Changxu Wang", "Deng Cai"]
    year: 2017
    arxiv: "1707.00143"
    venue: "PVLDB, Vol. 12, No. 5, pp. 461-474, 2019"
    algorithm: NSG
    canonical_for: NSG
    notes: "Proposes MRNG (Monotonic Relative Neighborhood Graph) and its practical approximation NSG. Deployed at Taobao/Alibaba at billion scale."
    verified: true

  # --- LSH ---
  - id: indyk1998lsh
    title: "Approximate Nearest Neighbors: Towards Removing the Curse of Dimensionality"
    authors: ["Piotr Indyk", "Rajeev Motwani"]
    year: 1998
    venue: "STOC 1998"
    doi: "10.1145/276698.276876"
    algorithm: LSH
    canonical_for: LSH
    notes: "Not on arXiv. The foundational LSH paper."
    verified: true

  # --- Random Projection Trees ---
  - id: dasgupta2008rpt
    title: "Random projection trees and low dimensional manifolds"
    authors: ["Sanjoy Dasgupta", "Yoav Freund"]
    year: 2008
    arxiv: "0805.1390"
    venue: "STOC 2008"
    canonical_for: "RPT (Annoy)"
    notes: "Theoretical foundation for random projection trees used by Annoy. Annoy itself has no peer-reviewed paper."
    verified: true

  # --- KD-tree ---
  - id: bentley1975kdtree
    title: "Multidimensional binary search trees used for associative searching"
    authors: ["Jon Louis Bentley"]
    year: 1975
    venue: "Communications of the ACM, 18(9):509-517"
    doi: "10.1145/361002.361007"
    algorithm: "KD-tree"
    canonical_for: "KD-tree"
    notes: "Not on arXiv. The foundational KD-tree paper."
    verified: true

  # --- VP-tree ---
  - id: yianilos1993vptree
    title: "Data structures and algorithms for nearest neighbor search in general metric spaces"
    authors: ["Peter N. Yianilos"]
    year: 1993
    venue: "SODA 1993"
    doi: "10.5555/313559.313789"
    algorithm: "VP-tree"
    canonical_for: "VP-tree"
    notes: "Not on arXiv."
    verified: true

  # --- RaBitQ ---
  - id: gao2024rabitq
    title: "RaBitQ: Quantizing High-Dimensional Vectors with a Theoretical Error Bound for Approximate Nearest Neighbor Search"
    authors: ["Jianyang Gao", "Cheng Long"]
    year: 2024
    arxiv: "2405.12497"
    venue: "SIGMOD 2024"
    algorithm: RaBitQ
    canonical_for: RaBitQ
    verified: true

  # --- ANN-Benchmarks ---
  - id: aumueller2018annbenchmarks
    title: "ANN-Benchmarks: A Benchmarking Tool for Approximate Nearest Neighbor Algorithms"
    authors: ["Martin Aumüller", "Erik Bernhardsson", "Alexander Faithfull"]
    year: 2018
    arxiv: "1807.05614"
    venue: "SISAP 2017 / Information Systems 2019"
    topic: "Benchmark methodology"
    canonical_for: "ann-benchmarks"
    verified: true

  # --- RNG (foundational for NSG/MRNG) ---
  - id: toussaint1980rng
    title: "The relative neighbourhood graph of a finite planar set"
    authors: ["Godfried T. Toussaint"]
    year: 1980
    venue: "Pattern Recognition, 12(4):261-268"
    topic: "Relative Neighborhood Graph — foundational for MRNG and NSG"
    verified: true

